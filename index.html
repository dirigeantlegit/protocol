<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c0c">
<title>Master Protocol</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0c0c;--card:#161616;--border:#1e1e1e;--border2:#242424;
  --text:#e8e4dc;--muted:#555;--muted2:#888;
  --sleep:#4a9eff;--face:#ff9f4a;--sport:#4aff9f;
  --height:#c44aff;--food:#ffdf4a;--always:#ff4a6e;--hygiene:#a8d8a8;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;min-height:100vh;overscroll-behavior:none}
#topbar{position:sticky;top:0;z-index:100;background:rgba(12,12,12,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 14px 0}
#topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#topbar-title{font-size:12px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
#topbar-date{font-size:11px;color:var(--muted2);font-family:monospace}
#tabs{display:flex;overflow-x:auto;gap:1px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;min-width:46px;padding:8px 10px 10px;border-bottom:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px}
.tab.active{border-bottom-color:var(--text)}
.tab-name{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px}
.tab.active .tab-name,.tab.today .tab-name{color:var(--text)}
.tab-mini-bar{width:26px;height:3px;border-radius:2px;background:#1e1e1e;overflow:hidden}
.tab-mini-fill{height:100%;border-radius:2px;transition:width 0.3s}
.tab-sport{font-size:9px;color:#444;font-family:monospace}
.page{display:none;padding:8px 14px 80px}
.page.active{display:block}
.day-header{padding:8px 0 14px;display:flex;justify-content:space-between;align-items:flex-start}
.day-title{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.day-sub{font-size:11px;color:var(--muted);margin-top:3px}
.badge-today{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 7px;border-radius:3px;background:rgba(74,255,159,0.12);color:var(--sport);border:1px solid rgba(74,255,159,0.2)}
.prog-box{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;margin-bottom:18px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:7px}
.prog-label{font-size:11px;color:var(--muted);font-family:monospace}
.prog-num{font-size:11px;color:var(--muted2);font-family:monospace}
.prog-bar{height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--sport),var(--sleep));transition:width 0.4s}
.prog-done{text-align:center;color:var(--sport);font-size:12px;font-weight:700;margin-top:8px;letter-spacing:2px}
.sec{margin-bottom:20px}
.sec-header{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:10px}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-title{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.sec-time{margin-left:auto;font-size:10px;color:#444;font-family:monospace}
.items{display:flex;flex-direction:column;gap:4px}

/* ITEM */
.item{background:var(--card);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.item.done{background:#1a2a1a;border-color:#2d4a2d}
.item.done .item-title{text-decoration:line-through;color:var(--muted)}
.item-top{display:flex;align-items:center;gap:0;padding:11px 10px 11px 12px}
.item-chk-area{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-left:6px}
.chk{width:20px;height:20px;border-radius:4px;flex-shrink:0;background:transparent;border:1.5px solid #333;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.item.done .chk{background:var(--sport);border-color:var(--sport)}
.chk-icon{display:none;color:#000;font-size:11px;font-weight:900;line-height:1}
.item.done .chk-icon{display:block}
.item-title{font-size:13px;font-weight:700;line-height:1.3}
.tag{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:3px;flex-shrink:0}
.exp-btn{font-size:12px;color:#444;transition:transform 0.2s;cursor:pointer;padding:4px 2px;line-height:1;flex-shrink:0}
.item.expanded .exp-btn{transform:rotate(180deg)}
.item-desc{display:none;padding:0 12px 12px 42px;font-size:11px;color:#777;line-height:1.65}
.item.expanded .item-desc{display:block}

/* SPORT CARD */
.sport-card{background:var(--card);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:4px}
.sport-card.all-done{background:#1a2a1a;border-color:#2d4a2d}
.sport-header{padding:13px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.sport-arrow{font-size:11px;color:#444;transition:transform 0.2s;margin-left:4px}
.sport-card.open .sport-arrow{transform:rotate(180deg)}
.sport-body{display:none;border-top:1px solid var(--border);padding:0 12px 12px}
.sport-card.open .sport-body{display:block}
.ex-row{border-bottom:1px solid #1a1a1a;overflow:hidden}
.ex-row:last-child{border-bottom:none}
.ex-row.done .ex-name{text-decoration:line-through;color:var(--muted)}
.ex-top{padding:11px 0;display:flex;align-items:center;gap:10px}
.ex-chk-area{display:flex;align-items:center;gap:10px;flex:1;cursor:pointer}
.ex-chk{width:16px;height:16px;border-radius:3px;flex-shrink:0;background:transparent;border:1.5px solid #333;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.ex-row.done .ex-chk{background:var(--sport);border-color:var(--sport)}
.ex-chk-icon{display:none;color:#000;font-size:9px;font-weight:900}
.ex-row.done .ex-chk-icon{display:block}
.ex-body{flex:1}
.ex-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.ex-meta{display:flex;gap:8px;flex-wrap:wrap}
.ex-sets{font-size:11px;color:var(--sport);font-family:monospace}
.ex-rest{font-size:11px;color:#444}
.ex-prog{font-size:10px;color:#555;font-style:italic}
.ex-exp{font-size:11px;color:#444;cursor:pointer;transition:transform 0.2s;flex-shrink:0}
.ex-row.expanded .ex-exp{transform:rotate(180deg)}
.ex-detail{display:none;padding:0 0 10px 26px;font-size:11px;color:#666;line-height:1.65}
.ex-row.expanded .ex-detail{display:block}
</style>
</head>

const MATIN_PROTO=[

  ]},
  J4:{label:"Push — Volume",exs:[
    {n:"Pompes diamant (poings)",              s:"4 × 8–12",  r:"90s",  p:"→ pieds surélevés",           d:"Poings rapprochés sous le sternum. Coudes longeant le corps à la descente. Cible triceps + pec interne. Descente 3s."},
    {n:"Pompes larges (poings)",               s:"3 × 10–15", r:"90s",  p:"Volume pur",                  d:"Poings le plus écartés possible. Descente 3s. Cible pectoraux externes. Pas de lest — séance volume, on accumule du travail."},
    {n:"Dips lestés (bande)",                  s:"4 × 6–8",   r:"2 min",p:"Lest progressif",             d:"Bande autour du cou ou haltère entre les pieds. Progression chaque semaine. Le lest sur dips = meilleur levier de force poussée en callisthénie."},
    {n:"Lateral raise haltères (5kg)",         s:"3 × 12–15", r:"60s",  p:"5kg → 10kg quand 3×15",      d:"Légèrement penché, coudes légèrement fléchis. Montée lente jusqu'à l'horizontal. Descente 3s. Si tu te balances = charge trop lourde."},
    {n:"Triceps overhead haltère (10kg)",      s:"3 × 10–12", r:"90s",  p:"→ 3×12 puis charge",         d:"Assis ou debout. Haltère 10kg tenu à deux mains derrière la tête. Coudes fixes pointant vers le haut. Extension complète. Descente 3s."},
  ]},
  J5:{label:"Pull + Neck",exs:[
    {n:"Tractions neutres",                    s:"4 × 6–10",  r:"2 min",p:"Lest progressif",             d:"Prise neutre (paumes face à face). Cible brachial + dorsaux différemment de la pronation. Full ROM. Descente 3s."},
    {n:"Australian pull-ups larges",           s:"4 × 10–15", r:"90s",  p:"→ pieds plus hauts",          d:"Prise très large en pronation. Corps aussi horizontal que possible. Cible grands dorsaux sur toute leur longueur — crée le V-taper. Tirer coudes vers les hanches."},
    {n:"Rowing haltère unilatéral (10kg)",     s:"3 × 10–12", r:"90s",  p:"Technique d'abord",           d:"Genou et main sur la chaise. Dos plat. Tirer le coude vers le plafond. ROM complet : bras tendu en bas, coude au-dessus du dos en haut. Descente 3s."},
    {n:"Chin tucks + neck curl allongé",       s:"3 × 15–20", r:"60s",  p:"→ résistance main",           d:"Allongé : rentrer le menton, soulever uniquement la tête. Descente 3s. Renforce les fléchisseurs profonds du cou — directement lié à la position de l'hyoïde."},
    {n:"Shrugs haltères (10kg)",               s:"3 × 12–15", r:"60s",  p:"Lest progressif",             d:"Haltères le long du corps. Montée lente, contraction 2s en haut, descente 3s. Ne pas rouler les épaules. Équilibre visuel cou/épaules."},
  ]},
  J6:{label:"Full Body — Intensité",exs:[
    {n:"Tractions pronation MAX ← note le chiffre !",s:"3 × max",r:"3 min",p:"Benchmark hebdo",         d:"Max reps full ROM strict. Repos 3 min entre séries. Note les 3 chiffres chaque semaine. C'est ton principal indicateur de progression."},
    {n:"Dips MAX ← note le chiffre !",          s:"3 × max",  r:"3 min",p:"Benchmark hebdo",            d:"Full ROM, pas de rebond. Note les chiffres. Si tes max montent semaine après semaine = le programme fonctionne."},
    {n:"Squat sauté (descente 3s)",             s:"4 × 10",   r:"90s",  p:"→ lest haltères",            d:"Descente contrôlée 3s, explosion maximale. Atterrissage amorti. Puissance musculaire — différent de la force pure."},
    {n:"Pompes explosives (poings)",            s:"3 × 6–8",  r:"2 min",p:"→ applaudissement",          d:"Descente 2s contrôlée, poussée explosive pour décoller. Atterrissage souple. Ajouter l'applaudissement quand la poussée est suffisante."},
    {n:"L-sit suspendu",                        s:"4 × max",  r:"90s",  p:"Genoux → tendus",            d:"Jambes à l'horizontale à la barre. Maintenir. Travaille core, fléchisseurs de hanche, épaules. Commencer genoux fléchis."},
  ]},
  J7:{label:"Repos actif",exs:[
    {n:"Marche 20–30 min",                      s:"—",        r:"—",    p:"Récupération active",         d:"Rythme tranquille. Active la circulation sans fatiguer les muscles — accélère la récupération des 6 jours."},
    {n:"Étirements statiques (pecs, dorsaux, ischio)",s:"30–60s chaque",r:"—",p:"",                     d:"Maintenir sans forcer. Jamais étirer muscle froid. Légère résistance, jamais douleur."},
    {n:"Mewing conscient renforcé",             s:"10 min",   r:"—",    p:"",                            d:"Pratiquer consciemment : posture linguale complète, déglutition correcte, posture cervicale. Jour idéal pour ancrer les habitudes."},
    {n:"Chin tucks légers",                     s:"2 × 15",   r:"—",    p:"",                            d:"Version légère pour maintenir l'activation. Pas d'effort intense — c'est un jour de repos."},
  ]},
};

const DAYS_FR   =["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const DAYS_SHORT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const SPORT_KEYS=["J1","J2","J3","J4","J5","J6","J7"];
const HEBDO_DAYS=[2,4,6];
const JS2IDX={1:0,2:1,3:2,4:3,5:4,6:5,0:6};

function todayIdx(){return JS2IDX[new Date().getDay()];}
function dayDateStr(di){
  const diff=di-todayIdx();
  const d=new Date();d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function ikey(di,id){return dayDateStr(di)+"_"+id;}

let ST={};
try{ST=JSON.parse(localStorage.getItem("mp3")||"{}");}catch{}
function save(){try{localStorage.setItem("mp3",JSON.stringify(ST));}catch{}}
function isChk(di,id){return !!ST[ikey(di,id)];}
function toggleChk(di,id){ST[ikey(di,id)]=!ST[ikey(di,id)];save();renderDay(di);renderTabs();}

const EXP={};
function isExp(k){return !!EXP[k];}
function togExp(k){EXP[k]=!EXP[k];}

function tagH(cat){
  const c=CATS[cat];
  return `<span class="tag" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${c.label}</span>`;
}

function itemH(it,di){
  const done=isChk(di,it.id);
  const exp=isExp(di+"_"+it.id);
  return `<div class="item${done?" done":""}${exp?" expanded":""}" id="I_${di}_${it.id}">
    <div class="item-top">
      <div class="item-chk-area" onclick="toggleChk(${di},'${it.id}')">
        <div class="chk"><span class="chk-icon">✓</span></div>
        <span class="item-title">${it.title}</span>
      </div>
      <div class="item-right">
        ${tagH(it.cat)}
        <span class="exp-btn" onclick="togItemExp(${di},'${it.id}')">▼</span>
      </div>
    </div>
    <div class="item-desc">${it.desc}</div>
  </div>`;
}

function sportH(di){
  const sk=SPORT_KEYS[di];
  const sp=SPORT[sk];
  const allDone=sp.exs.every((_,i)=>isChk(di,`e_${sk}_${i}`));
  const open=isExp("sp_"+di);
  const rows=sp.exs.map((ex,i)=>{
    const done=isChk(di,`e_${sk}_${i}`);
    const exp=isExp(`ex_${di}_${sk}_${i}`);
    return `<div class="ex-row${done?" done":""}${exp?" expanded":""}" id="EX_${di}_${sk}_${i}">
      <div class="ex-top">
        <div class="ex-chk-area" onclick="toggleChk(${di},'e_${sk}_${i}')">
          <div class="ex-chk"><span class="ex-chk-icon">✓</span></div>
          <div class="ex-body">
            <div class="ex-name">${ex.n}</div>
            <div class="ex-meta">
              <span class="ex-sets">${ex.s}</span>
              ${ex.r!=="—"?`<span class="ex-rest">repos ${ex.r}</span>`:""}
              ${ex.p?`<span class="ex-prog">${ex.p}</span>`:""}
            </div>
          </div>
        </div>
        <span class="ex-exp" onclick="togExExp(${di},'${sk}',${i})">▼</span>
      </div>
      ${ex.d?`<div class="ex-detail">${ex.d}</div>`:""}
    </div>`;
  }).join("");
  return `<div class="sport-card${allDone?" all-done":""}${open?" open":""}" id="SC_${di}">
    <div class="sport-header" onclick="togSport(${di})">
      <div class="chk" style="${allDone?"background:var(--sport);border-color:var(--sport)":""}">
        ${allDone?'<span class="chk-icon" style="display:block">✓</span>':""}
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:${allDone?"var(--muted)":"var(--text)"}">Séance — ${sp.label}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${sp.exs.length} exercices · appuie pour voir</div>
      </div>
      ${tagH("sport")}
      <span class="sport-arrow">▼</span>
    </div>
    <div class="sport-body">${rows}</div>
  </div>`;
}

function sec(title,time,dot,html){
  return `<div class="sec">
    <div class="sec-header">
      <div class="sec-dot" style="background:${dot}"></div>
      <span class="sec-title">${title}</span>
      ${time?`<span class="sec-time">${time}</span>`:""}
    </div>
    <div class="items">${html}</div>
  </div>`;
}

function dayProg(di){
  const sk=SPORT_KEYS[di];
  const items=[...MATIN_HYG,...MATIN_PROTO,...JOURNEE_HYG,...SOIR_HYG,...SOIR_PROTO,...COUCHER,...TOUJOURS];
  if(HEBDO_DAYS.includes(di))items.push(...HEBDO);
  const exIds=SPORT[sk].exs.map((_,i)=>`e_${sk}_${i}`);
  const total=items.length+exIds.length;
  const done=items.filter(t=>isChk(di,t.id)).length+exIds.filter(id=>isChk(di,id)).length;
  return{done,total,pct:total>0?Math.round(done/total*100):0};
}

function renderDay(di){
  const el=document.getElementById(`P_${di}`);
  if(!el)return;
  const sk=SPORT_KEYS[di];
  const{done,total,pct}=dayProg(di);
  const isT=di===todayIdx();
  el.innerHTML=`
    <div class="day-header">
      <div><div class="day-title">${DAYS_FR[di]}</div><div class="day-sub">${sk} — ${SPORT[sk].label}</div></div>
      ${isT?'<span class="badge-today">Aujourd\'hui</span>':""}
    </div>
    <div class="prog-box">
      <div class="prog-row"><span class="prog-label">Progression</span><span class="prog-num">${done} / ${total}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${pct===100?'<div class="prog-done">JOURNÉE COMPLÈTE ✓</div>':""}
    </div>
    ${sec("Matin — Hygiène","",CATS.hygiene.text,MATIN_HYG.map(t=>itemH(t,di)).join(""))}
    ${sec("Matin — Protocole","~15 min",CATS.face.text,MATIN_PROTO.map(t=>itemH(t,di)).join(""))}
    ${sec("Sport",sk==="J7"?"~20 min":"~35–45 min",CATS.sport.text,sportH(di))}
    ${sec("Journée — Hydratation & Hygiène","",CATS.hygiene.text,JOURNEE_HYG.map(t=>itemH(t,di)).join(""))}
    ${sec("Soir — Hygiène","",CATS.hygiene.text,SOIR_HYG.map(t=>itemH(t,di)).join(""))}
    ${sec("Soir — Protocole","~15 min",CATS.height.text,SOIR_PROTO.map(t=>itemH(t,di)).join(""))}
    ${sec("Coucher","23h max",CATS.sleep.text,COUCHER.map(t=>itemH(t,di)).join(""))}
    ${HEBDO_DAYS.includes(di)?sec("Hebdomadaire (ce jour)","~12 min",CATS.face.text,HEBDO.map(t=>itemH(t,di)).join("")):""}
    ${sec("Toujours — toute la journée","",CATS.always.text,TOUJOURS.map(t=>itemH(t,di)).join(""))}
  `;
}

function togItemExp(di,id){
  const k=di+"_"+id;togExp(k);
  const el=document.getElementById(`I_${di}_${id}`);
  if(el)el.classList.toggle("expanded",isExp(k));
}
function togExExp(di,sk,i){
  const k=`ex_${di}_${sk}_${i}`;togExp(k);
  const el=document.getElementById(`EX_${di}_${sk}_${i}`);
  if(el)el.classList.toggle("expanded",isExp(k));
}
function togSport(di){
  const k="sp_"+di;togExp(k);
  renderDay(di);
}

let activeDay=todayIdx();

function renderTabs(){
  document.getElementById("tabs").innerHTML=DAYS_SHORT.map((n,i)=>{
    const{pct}=dayProg(i);
    const isT=i===todayIdx();
    return `<div class="tab${i===activeDay?" active":""}${isT?" today":""}" onclick="switchDay(${i})">
      <span class="tab-name">${n}${isT?'<span style="color:#4aff9f">·</span>':""}</span>
      <div class="tab-mini-bar"><div class="tab-mini-fill" style="width:${pct}%;background:${pct===100?"#4aff9f":"#4a9eff"}"></div></div>
      <span class="tab-sport">${SPORT_KEYS[i]}</span>
    </div>`;
  }).join("");
}

function switchDay(i){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(`P_${i}`).classList.add("active");
  activeDay=i;renderTabs();
  document.querySelectorAll(".tab")[i]?.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"});
}

window.onload=function(){
  const d=new Date();
  const mo=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
  document.getElementById("topbar-date").textContent=DAYS_FR[todayIdx()]+" "+d.getDate()+" "+mo[d.getMonth()];
  const pg=document.getElementById("pages");
  for(let i=0;i<7;i++){
    const div=document.createElement("div");
    div.className="page"+(i===activeDay?" active":"");
    div.id=`P_${i}`;pg.appendChild(div);renderDay(i);
  }
  renderTabs();
};
</script>
</body>
</html>
