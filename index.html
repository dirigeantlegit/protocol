<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060810">
<title>ASCEND Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060810;--bg2:#0a0e1a;--card:#0d1120;--card2:#111827;
  --border:#1a2035;--border2:#242f4a;
  --text:#e2e8f8;--muted:#4a5580;--muted2:#7a88b8;
  --gold:#f5c842;--gold2:#e8a800;
  --blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;
  --orange:#f97316;--red:#ef4444;--purple:#8b5cf6;
  --growth:#06b6d4;--face:#a78bfa;--sport:#10b981;--hygiene:#64748b;
  --xp-bar:#3b82f6;
}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overscroll-behavior:none}
/* NOISE TEXTURE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* GRID LINES BG */
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* ── HEADER ── */
#header{position:sticky;top:0;z-index:200;background:rgba(6,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2)}
#header-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 6px}
#logo{font-size:14px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#date-display{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted2)}

/* XP BAR */
#xp-section{padding:6px 14px 10px}
#xp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
#rank-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold)}
#xp-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted2)}
#xp-bar-wrap{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;position:relative}
#xp-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width 0.6s cubic-bezier(.4,0,.2,1);position:relative}
#xp-bar-fill::after{content:'';position:absolute;right:0;top:0;width:8px;height:100%;background:rgba(255,255,255,0.6);filter:blur(3px)}
#xp-bar-glow{position:absolute;top:-2px;height:8px;border-radius:4px;background:linear-gradient(90deg,transparent,rgba(6,182,212,0.3));pointer-events:none;transition:width 0.6s cubic-bezier(.4,0,.2,1)}

/* STATS ROW */
#stats-row{display:flex;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.stat-box{flex:1;background:var(--bg2);padding:8px 6px;text-align:center}
.stat-val{font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:700;line-height:1}
.stat-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* ── TABS ── */
#tabs{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border2);scrollbar-width:none;padding:0 4px}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;min-width:52px}
.tab.active{border-bottom-color:var(--cyan)}
.tab-icon{font-size:16px;line-height:1}
.tab-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:color 0.2s}
.tab.active .tab-lbl{color:var(--cyan)}
.tab-xp{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted)}
.tab.active .tab-xp{color:var(--gold)}

/* ── PAGES ── */
.page{display:none;padding:12px 12px 100px;position:relative;z-index:1}
.page.active{display:block}

/* DAY HEADER */
.day-hero{padding:12px 0 16px}
.day-name{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1}
.day-sub{font-size:12px;color:var(--muted2);margin-top:3px;font-family:'Share Tech Mono',monospace}
.badge-today{font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:2px;background:rgba(6,182,212,0.15);color:var(--cyan);border:1px solid rgba(6,182,212,0.3);text-transform:uppercase}

/* DAY PROGRESS */
.day-prog{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:16px;position:relative;overflow:hidden}
.day-prog::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,0.04),transparent);pointer-events:none}
.day-prog-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.day-prog-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.day-prog-nums{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--cyan)}
.day-prog-bar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:8px}
.day-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width 0.5s ease}
.day-xp-earn{font-size:10px;color:var(--gold);font-family:'Share Tech Mono',monospace}
.day-complete{text-align:center;padding:6px 0 2px;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* ── SECTION ── */
.sec{margin-bottom:18px}
.sec-header{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid var(--border)}
.sec-icon{font-size:14px;line-height:1}
.sec-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);flex:1}
.sec-xp{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--gold)}
.sec-time{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted)}
.items{display:flex;flex-direction:column;gap:3px}

/* ── ITEM ── */
.item{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.15s}
.item.done{background:#0a1a12;border-color:#1a3a28}
.item.done .ititle{text-decoration:line-through;color:var(--muted)}
.item-top{display:flex;align-items:center;padding:11px 10px 11px 12px;gap:10px}
.item-chk-zone{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.chk{width:22px;height:22px;border-radius:5px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative}
.item.done .chk{background:var(--green);border-color:var(--green)}
.chk::after{content:'✓';display:none;color:#000;font-size:13px;font-weight:900;line-height:1}
.item.done .chk::after{display:block}
.ititle{font-size:13px;font-weight:600;line-height:1.3}
.icat{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 5px;border-radius:2px;flex-shrink:0}
.ixp{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--gold);flex-shrink:0}
.iexp{font-size:13px;color:var(--muted);cursor:pointer;transition:transform 0.2s;flex-shrink:0;line-height:1;padding:2px}
.item.expanded .iexp{transform:rotate(180deg)}
.idesc{display:none;padding:0 12px 12px 44px;font-size:11px;color:var(--muted2);line-height:1.7;font-family:'Rajdhani',sans-serif;font-weight:400}
.item.expanded .idesc{display:block}

/* PRIORITY GLOW for high-value items */
.item.priority-high{border-color:rgba(6,182,212,0.25)}
.item.priority-high .chk{border-color:rgba(6,182,212,0.4)}

/* ── SPORT CARD ── */
.sport-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:3px}
.sport-card.all-done{background:#0a1a12;border-color:#1a3a28}
.sport-hdr{padding:13px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.sport-arr{font-size:12px;color:var(--muted);transition:transform 0.2s}
.sport-card.open .sport-arr{transform:rotate(180deg)}
.sport-bdy{display:none;border-top:1px solid var(--border);padding:0 12px 12px}
.sport-card.open .sport-bdy{display:block}
.ex{border-bottom:1px solid var(--border);overflow:hidden}
.ex:last-child{border-bottom:none}
.ex.done .exname{text-decoration:line-through;color:var(--muted)}
.ex-top{padding:10px 0;display:flex;align-items:center;gap:10px}
.ex-chk-z{display:flex;align-items:center;gap:10px;flex:1;cursor:pointer}
.exchk{width:16px;height:16px;border-radius:3px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.ex.done .exchk{background:var(--green);border-color:var(--green)}
.exchk::after{content:'✓';display:none;color:#000;font-size:9px;font-weight:900}
.ex.done .exchk::after{display:block}
.exbody{flex:1}
.exname{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.3}
.exmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.exsets{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green)}
.exrest{font-size:10px;color:var(--muted)}
.exprog{font-size:10px;color:var(--muted2);font-style:italic}
.ex-exp-btn{font-size:11px;color:var(--muted);cursor:pointer;transition:transform 0.2s;flex-shrink:0}
.ex.expanded .ex-exp-btn{transform:rotate(180deg)}
.exdetail{display:none;padding:0 0 10px 26px;font-size:11px;color:var(--muted2);line-height:1.65}
.ex.expanded .exdetail{display:block}

/* XP POPUP ANIMATION */
.xp-popup{position:fixed;pointer-events:none;font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:var(--gold);z-index:999;animation:xpFloat 1.2s ease-out forwards}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* RANK UP FLASH */
.rank-flash{position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;background:rgba(6,8,16,0.85);animation:flashIn 2.5s ease-out forwards;pointer-events:none}
@keyframes flashIn{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.rank-flash-inner{text-align:center;animation:scaleIn 0.3s ease-out}
@keyframes scaleIn{0%{transform:scale(0.7)}100%{transform:scale(1)}}
.rank-flash-title{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.rank-flash-name{font-size:36px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* HOME PAGE */
#home-hero{padding:20px 0 24px;text-align:center}
#home-rank-circle{width:110px;height:110px;border-radius:50%;border:2px solid var(--gold2);margin:0 auto 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(245,200,66,0.08),transparent);position:relative}
#home-rank-circle::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(245,200,66,0.2)}
#home-rank-emoji{font-size:32px;line-height:1}
#home-rank-name{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:2px}
#home-xp-big{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2);margin-bottom:4px}
#home-total-xp{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--gold);line-height:1}
#home-streak{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-size:12px;font-weight:600;color:var(--orange)}

.home-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.home-stat-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center}
.home-stat-icon{font-size:20px;margin-bottom:6px}
.home-stat-val{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;line-height:1}
.home-stat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}

.today-btn{display:block;width:100%;padding:14px;background:linear-gradient(90deg,rgba(59,130,246,0.2),rgba(6,182,212,0.2));border:1px solid rgba(6,182,212,0.4);border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);cursor:pointer;text-align:center;margin-bottom:12px;transition:all 0.2s}
.today-btn:active{background:rgba(6,182,212,0.2);transform:scale(0.98)}

/* RANKS TABLE */
.ranks-section{margin-top:20px}
.ranks-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;margin-bottom:4px}
.rank-row.current-rank{border-color:var(--gold2);background:rgba(245,200,66,0.06)}
.rank-emoji{font-size:18px;width:28px;text-align:center}
.rank-info{flex:1}
.rank-name{font-size:13px;font-weight:700}
.rank-req{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)}
.rank-check{color:var(--gold);font-size:14px}

/* ── MISC ── */
.cat-growth{background:rgba(6,182,212,0.12);color:var(--growth);border:1px solid rgba(6,182,212,0.25)}
.cat-face{background:rgba(167,139,250,0.12);color:var(--face);border:1px solid rgba(167,139,250,0.25)}
.cat-sport{background:rgba(16,185,129,0.12);color:var(--sport);border:1px solid rgba(16,185,129,0.25)}
.cat-hygiene{background:rgba(100,116,139,0.12);color:#94a3b8;border:1px solid rgba(100,116,139,0.25)}

@media(max-width:400px){.day-name{font-size:24px}.tab-lbl{font-size:8px}}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-top">
    <div id="logo">ASCEND</div>
    <div id="date-display"></div>
  </div>
  <div id="xp-section">
    <div id="xp-row">
      <span id="rank-label">RANG : —</span>
      <span id="xp-label">0 / 0 XP</span>
    </div>
    <div id="xp-bar-wrap">
      <div id="xp-bar-fill" style="width:0%"></div>
      <div id="xp-bar-glow" style="width:0%"></div>
    </div>
  </div>
  <div id="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="stat-total-xp" style="color:var(--gold)">0</div>
      <div class="stat-lbl">XP Total</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-streak" style="color:var(--orange)">0🔥</div>
      <div class="stat-lbl">Streak</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-today-pct" style="color:var(--cyan)">0%</div>
      <div class="stat-lbl">Aujourd'hui</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-level" style="color:var(--purple)">Nv.1</div>
      <div class="stat-lbl">Niveau</div>
    </div>
  </div>
  <!-- TABS -->
  <div id="tabs"></div>
</div>

<div id="pages"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// RANKS & XP SYSTEM
// ═══════════════════════════════════════════════════════════════
const RANKS=[
  {name:"Dormant",     emoji:"💤", minXP:0,    color:"#64748b"},
  {name:"Éveillé",    emoji:"👁",  minXP:100,  color:"#94a3b8"},
  {name:"Initié",     emoji:"⚡",  minXP:300,  color:"#60a5fa"},
  {name:"Discipliné", emoji:"🔱",  minXP:700,  color:"#34d399"},
  {name:"Forgé",      emoji:"⚔️",  minXP:1500, color:"#f59e0b"},
  {name:"Ascendant",  emoji:"🦅",  minXP:3000, color:"#f97316"},
  {name:"Élite",      emoji:"🔥",  minXP:6000, color:"#ef4444"},
  {name:"Apex",       emoji:"👑",  minXP:12000,color:"#f5c842"},
];

function getRank(xp){
  let r=RANKS[0];
  for(const rank of RANKS) if(xp>=rank.minXP) r=rank; else break;
  return r;
}
function getNextRank(xp){
  for(const rank of RANKS) if(xp<rank.minXP) return rank;
  return null;
}
function getLevel(xp){return Math.floor(xp/100)+1;}

// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const XP={growth:15,face:12,sport:10,hygiene:5};

// Items with XP value per completion
function mkItem(id,cat,title,desc,priority){
  return{id,cat,title,desc,priority:priority||false,xp:XP[cat]||10};
}

const MATIN_HYG=[
  mkItem("mh1","hygiene","Verre d'eau au réveil","Avant tout le reste. 250ml minimum bu immédiatement. Réhydrate les disques intervertébraux après 8h — mesurés, ils perdent ~1cm la nuit."),
  mkItem("mh2","hygiene","Se laver le visage","Eau froide uniquement le matin (pas de nettoyant). Rincer, sécher en tapotant. Le nettoyant le matin aggrave le sébum — réservé au soir."),
  mkItem("mh3","hygiene","Brosser les dents","2 min, mouvements circulaires. Inclure la langue. Attendre 30 min si tu as bu un jus acide."),
  mkItem("mh4","hygiene","Déodorant","Sur peau sèche après lavage."),
];

const MATIN_GROWTH=[
  mkItem("mg1","growth","Téléphone hors chambre la veille ✓","Vérifier que c'était bien fait. La GH est sécrétée entre 23h et 3h — toute perturbation de ce créneau réduit le pic.","high"),
  mkItem("mg2","face","Drainage cervical","Pouces le long du SCM (oreille → clavicule) × 10. Puis sous la mâchoire × 8. Puis sous les pommettes × 8. Toujours cet ordre — ouvrir la sortie avant d'envoyer le fluide.","high"),
  mkItem("mg3","face","Relâche masséter","Pouces sur l'angle de la mâchoire, cercles remontants 30s. Puis milieu joue : enfoncer + ouvrir grand la bouche 8×. Libère le bruxisme nocturne."),
  mkItem("mg4","face","Stretch lingual","Tissu propre, tirer la langue. Gauche/droite 5× chaque. Haut/bas 3s maintenu. Fascia spiral de la langue — tendu = mewing impossible."),
  mkItem("mg5","face","Thumb pulling — matin","Dos au mur, menton rentré. Pouces bords extérieurs du palais, pression haut + extérieur. 5–6 × 10s. 3 zones : arrière → milieu → avant. Sutures actives jusqu'à ~25 ans.","high"),
  mkItem("mg6","growth","Petit-déjeuner ★ CRITIQUE","Fromage blanc 200g + flocons 50g + poignée noix = 35g protéines en 4 min. Sans petit-déj = catabolisme 16h. À 62kg tu dois MANGER — tu es en phase de croissance.","high"),
];

const JOURNEE=[
  mkItem("j1","growth","Eau — viser 2.5L aujourd'hui","1 bouteille le matin, 1 l'après-midi. Les disques intervertébraux sont composés à 80% d'eau — déshydratation = compression mesurable.","high"),
  mkItem("j2","face","Mewing toute la journée","Langue entière contre le palais (tiers postérieur). Avaler la salive pour trouver la position. Alarme toutes les 2h.","high"),
  mkItem("j3","face","Respiration nasale exclusive","Bouche fermée en permanence. Respiration buccale = palais étroit, hyoïde bas, moins d'oxyde nitrique. Si difficile la nuit : Myotape."),
  mkItem("j4","face","Déglutition correcte","Langue vers palais (pas vers les dents). Visage neutre en avalant. Seuls les muscles du cou bougent."),
  mkItem("j5","face","Mastication bilatérale aux repas","20–30 masticatoires/bouchée, les deux côtés. Aliments durs prioritaires."),
  mkItem("j6","growth","Posture cervicale correcte","Oreilles au-dessus des épaules. Tête en avant = hyoïde descend + perte de taille mesurable. Check toutes les heures."),
  mkItem("j7","hygiene","Changer les sous-vêtements","Base quotidienne."),
];

const DAYS_FR=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const DAYS_SHORT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const SK=["J1","J2","J3","J4","J5","J6","J7"];
const HEBDO_DAYS=[2,4,6];
const JS2I={1:0,2:1,3:2,4:3,5:4,6:5,0:6};

function todayI(){return JS2I[new Date().getDay()];}
function dayDate(di){
  const diff=di-todayI();const d=new Date();d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function ikey(di,id){return dayDate(di)+"_"+id;}

// ── STATE ──
let ST={};
try{ST=JSON.parse(localStorage.getItem("asc_v1")||"{}");}catch{}
function save(){try{localStorage.setItem("asc_v1",JSON.stringify(ST));}catch{}}

function isChk(di,id){return !!ST[ikey(di,id)];}
function getXP(di,id){return isChk(di,id)?(ST[ikey(di,id+"_xp")]||0):0;}

function toggleChk(di,id,xpVal,ev){
  const k=ikey(di,id);const kx=ikey(di,id+"_xp");
  const wasDone=!!ST[k];
  ST[k]=!ST[k];
  if(ST[k]){ST[kx]=xpVal;if(ev)showXPPopup(ev,xpVal);}
  else{delete ST[kx];}
  save();updateGlobalXP();renderDay(di);renderTabs();updateHeader();
}

// ── GLOBAL XP ──
function calcTotalXP(){
  let total=0;
  for(const k of Object.keys(ST)){
    if(k.endsWith("_xp"))total+=ST[k]||0;
  }
  return total;
}
function calcTodayXP(){
  const di=todayI();let total=0;
  const allItems=getAllItems(di);
  for(const it of allItems){
    const k=ikey(di,it.id+"_xp");
    if(ST[k])total+=ST[k];
  }
  const sk=SK[di];
  SPORT[sk].exs.forEach((_,i)=>{const k=ikey(di,`e_${sk}_${i}_xp`);if(ST[k])total+=ST[k];});
  return total;
}
function calcStreak(){
  let streak=0;const today=todayI();
  for(let offset=0;offset<30;offset++){
    const di=(today-offset+7)%7;
    const items=getAllItems(di);const sk=SK[di];
    const total=items.length+SPORT[sk].exs.length;
    if(total===0)break;
    const done=items.filter(it=>isChk(di,it.id)).length+SPORT[sk].exs.filter((_,i)=>isChk(di,`e_${sk}_${i}`)).length;
    if(done/total>=0.7)streak++;else break;
  }
  return streak;
}

function getAllItems(di){
  const base=[...MATIN_HYG,...MATIN_GROWTH,...JOURNEE,...SOIR_HYG,...SOIR_GROWTH,...COUCHER,...TOUJOURS];
  if(HEBDO_DAYS.includes(di))return[...base,...HEBDO];
  return base;
}

function dayProg(di){
  const items=getAllItems(di);const sk=SK[di];
  const total=items.length+SPORT[sk].exs.length;
  const done=items.filter(it=>isChk(di,it.id)).length+SPORT[sk].exs.filter((_,i)=>isChk(di,`e_${sk}_${i}`)).length;
  const xpEarned=items.reduce((s,it)=>s+(ST[ikey(di,it.id+"_xp")]||0),0)+SPORT[sk].exs.reduce((s,_,i)=>s+(ST[ikey(di,`e_${sk}_${i}_xp`)]||0),0);
  return{done,total,pct:total>0?Math.round(done/total*100):0,xpEarned};
}

// ── XP POPUP ──
function showXPPopup(ev,xp){
  const el=document.createElement("div");
  el.className="xp-popup";el.textContent="+"+xp+" XP";
  const touch=ev.touches?ev.touches[0]:ev;
  el.style.left=(touch.clientX-20)+"px";el.style.top=(touch.clientY-30)+"px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

// ── RANK UP ──
let lastRank=null;
function checkRankUp(xp){
  const r=getRank(xp);
  if(lastRank&&r.name!==lastRank.name){
    const flash=document.createElement("div");
    flash.className="rank-flash";
    flash.innerHTML=`<div class="rank-flash-inner"><div class="rank-flash-title">RANG ATTEINT</div><div class="rank-flash-name">${r.emoji} ${r.name}</div></div>`;
    document.body.appendChild(flash);
    setTimeout(()=>flash.remove(),2500);
  }
  lastRank=r;
}

// ── UPDATE HEADER ──
function updateHeader(){
  const xp=calcTotalXP();
  const rank=getRank(xp);const next=getNextRank(xp);
  const level=getLevel(xp);
  const streak=calcStreak();
  const{pct}=dayProg(todayI());

  document.getElementById("rank-label").textContent="RANG : "+rank.name.toUpperCase();
  document.getElementById("rank-label").style.color=rank.color||"var(--gold)";

  if(next){
    const prog=xp-rank.minXP;const needed=next.minXP-rank.minXP;
    const pctBar=Math.round(prog/needed*100);
    document.getElementById("xp-label").textContent=xp+" / "+next.minXP+" XP";
    document.getElementById("xp-bar-fill").style.width=pctBar+"%";
    document.getElementById("xp-bar-glow").style.width=pctBar+"%";
  } else {
    document.getElementById("xp-label").textContent=xp+" XP — MAX";
    document.getElementById("xp-bar-fill").style.width="100%";
  }

  document.getElementById("stat-total-xp").textContent=xp;
  document.getElementById("stat-streak").textContent=streak+"🔥";
  document.getElementById("stat-today-pct").textContent=pct+"%";
  document.getElementById("stat-level").textContent="Nv."+level;

  checkRankUp(xp);
}

function updateGlobalXP(){updateHeader();}

function renderHome(){
  const el=document.getElementById("P_home");if(!el)return;
  const xp=calcTotalXP();const rank=getRank(xp);const next=getNextRank(xp);
  const streak=calcStreak();const level=getLevel(xp);
  const todayXP=calcTodayXP();
  el.innerHTML=`
    <div id="home-hero">
      <div id="home-rank-circle">
        <div id="home-rank-emoji">${rank.emoji}</div>
        <div id="home-rank-name">${rank.name}</div>
      </div>
      <div id="home-xp-big">XP TOTAL</div>
      <div id="home-total-xp">${xp}</div>
      <div id="home-streak">🔥 ${streak} jours de streak · Niveau ${level}</div>
    </div>
    <div class="home-stats">
      <div class="home-stat-card">
        <div class="home-stat-icon">📈</div>
        <div class="home-stat-val" style="color:var(--gold)">${xp}</div>
        <div class="home-stat-lbl">XP Total</div>
      </div>
      <div class="home-stat-card">
        <div class="home-stat-icon">🔥</div>
        <div class="home-stat-val" style="color:var(--orange)">${streak}</div>
        <div class="home-stat-lbl">Jours streak</div>
      </div>
      <div class="home-stat-card">
        <div class="home-stat-icon">⚡</div>
        <div class="home-stat-val" style="color:var(--cyan)">${todayXP}</div>
        <div class="home-stat-lbl">XP aujourd'hui</div>
      </div>
      <div class="home-stat-card">
        <div class="home-stat-icon">🏆</div>
        <div class="home-stat-val" style="color:var(--purple)">${level}</div>
        <div class="home-stat-lbl">Niveau</div>
      </div>
    </div>
    <button class="today-btn" onclick="switchDay(${todayI()})">→ ALLER À AUJOURD'HUI</button>
    ${next?`<div style="font-size:11px;color:var(--muted2);text-align:center;margin-bottom:16px;font-family:'Share Tech Mono',monospace">Prochain rang : ${next.emoji} ${next.name} à ${next.minXP} XP · encore ${next.minXP-xp} XP</div>`:"<div style='text-align:center;color:var(--gold);font-size:12px;margin-bottom:16px'>RANG MAXIMUM ATTEINT 👑</div>"}
    <div class="ranks-section">
      <div class="ranks-title">TABLEAU DES RANGS</div>
      ${RANKS.map(r=>`<div class="rank-row${r.name===rank.name?" current-rank":""}">
        <span class="rank-emoji">${r.emoji}</span>
        <div class="rank-info">
          <div class="rank-name" style="color:${r.color}">${r.name}</div>
          <div class="rank-req">${r.minXP} XP requis</div>
        </div>
        ${xp>=r.minXP?'<span class="rank-check">✓</span>':""}
      </div>`).join("")}
    </div>
  `;
}

// ── TOGGLE FUNCTIONS ──
function doToggle(ev,di,id,xpVal){ev.stopPropagation();toggleChk(di,id,xpVal,ev);}
function doToggleEx(ev,di,sk,i){
  ev.stopPropagation();
  const id=`e_${sk}_${i}`;toggleChk(di,id,XP.sport,ev);
}
function togExp(di,id){
  const k="exp_"+di+"_"+id;window[k]=!window[k];
  const el=document.getElementById("I_"+di+"_"+id);
  if(el)el.classList.toggle("expanded",window[k]);
}
function togExExp(di,sk,i){
  const k="exexp_"+di+"_"+sk+"_"+i;window[k]=!window[k];
  const el=document.getElementById("EX_"+di+"_"+sk+"_"+i);
  if(el)el.classList.toggle("expanded",window[k]);
}
function togSport(di){
  window["sport_open_"+di]=!window["sport_open_"+di];renderDay(di);
}

// ── TABS ──
let activeTab="home";

function renderTabs(){
  const dayTabs=DAYS_SHORT.map((n,i)=>{
    const{pct}=dayProg(i);const isT=i===todayI();
    const sk=SK[i];
    return`<div class="tab${activeTab===String(i)?" active":""}${isT?" today":""}" onclick="switchDay(${i})">
      <span class="tab-icon">${SPORT[sk].emoji}</span>
      <span class="tab-lbl">${n}${isT?'<span style="color:var(--cyan)">·</span>':""}</span>
      <span class="tab-xp">${pct}%</span>
    </div>`;
  }).join("");
  document.getElementById("tabs").innerHTML=
    `<div class="tab${activeTab==="home"?" active":""}" onclick="switchHome()">
      <span class="tab-icon">🏠</span><span class="tab-lbl">Accueil</span><span class="tab-xp">XP</span>
    </div>`+dayTabs;
}

function switchDay(i){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("P_"+i).classList.add("active");
  activeTab=String(i);renderTabs();
  document.querySelectorAll(".tab")[i+1]?.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"});
}
function switchHome(){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("P_home").classList.add("active");
  activeTab="home";renderHome();renderTabs();
}

// ── INIT ──
window.onload=function(){
  const d=new Date();
  const mo=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
  document.getElementById("date-display").textContent=DAYS_FR[todayI()]+" "+d.getDate()+" "+mo[d.getMonth()];

  const pg=document.getElementById("pages");

  // Home page
  const home=document.createElement("div");
  home.className="page active";home.id="P_home";pg.appendChild(home);

  // Day pages
  for(let i=0;i<7;i++){
    const div=document.createElement("div");
    div.className="page";div.id="P_"+i;pg.appendChild(div);renderDay(i);
  }

  renderHome();renderTabs();updateHeader();
  lastRank=getRank(calcTotalXP());
};
</script>
